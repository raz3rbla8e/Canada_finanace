# TD Canada Trust EasyWeb Chequing
name: "TD Canada Trust (Chequing)"
version: 1
last_verified: "2026-04"
account_label: "TD Chequing"
encoding: "utf-8-sig"

detection:
  header_contains:
    - "deposits"
  header_contains_any:
    - "withdrawals ($)"
    - "total balance"

columns:
